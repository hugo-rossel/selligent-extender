name: Package and Release ÅMP-r

on:
  push:
    tags:
      - 'v*' # Se déclenche lors du push d'un tag de version (ex: v0.4)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Extension (Prod Only)
        run: |
          zip -r amp-r.zip ./* -x "README.md" -x ".git*" -x ".github*"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: amp-r.zip
          draft: false
          prerelease: false
          name: ÅMP-r ${{ github.ref_name }}
          body: |
            ## ÅMP-r ${{ github.ref_name }} (Production)
            
            ### 🌐 Page d'accueil & Guide de mise à jour
            Retrouvez le guide complet d'installation et de mise à jour sur la page d'accueil du dépôt :
            👉 **[https://github.com/hugo-rossel/amp-r](https://github.com/hugo-rossel/amp-r)**
            
            ### 🔄 Comment mettre à jour :
            1. Téléchargez le fichier **`amp-r.zip`** ci-dessous.
            2. Extrayez son contenu et remplacez les fichiers existants dans votre dossier d'installation permanent (ex : `C:\AMP-r`).
            3. Ouvrez **`chrome://extensions/`** dans Chrome et cliquez sur l'icône **Actualiser 🔄** sur la carte de l'extension *ÅMP-r*.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
